<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestion Patients - Futur</title>
<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: #e0f7fa;
  margin: 0;
}
.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}
h1 {
  text-align: center;
  color: #00e5ff;
}
.section {
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
  padding: 20px;
  margin: 20px 0;
  box-shadow: 0 0 20px rgba(0,229,255,0.2);
}
label { display:block; margin-top:10px; }
input, textarea, select {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
  border-radius: 8px;
  border: none;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 10px;
}
table {
  width: 100%;
  border-collapse: collapse;
}
td, th {
  border: 1px solid #00e5ff;
  padding: 5px;
  text-align: center;
}
.canvas-container {
  border: 2px dashed #00e5ff;
  height: 300px;
  position: relative;
}
canvas { width:100%; height:100%; }
button {
  background: #00e5ff;
  border: none;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>
<body>
<div class="container">
<h1>🩺 Gestion des Patients</h1>

<div class="section">
<h2>Information</h2>
<label>N° Intervention</label>
<input id="intervention" readonly>
<label>Nom</label><input>
<label>Prénom</label><input>
<label>Date de naissance</label><input type="date">
<label>Sexe</label>
<input type="checkbox"> M <input type="checkbox"> F
<label>Adresse</label><input>
<label>Téléphone</label><input>
</div>

<div class="section">
<h2>Prise en charge</h2>
<label><input type="checkbox"> Par Equipe</label>
<label><input type="checkbox"> Ambulance</label>
<label><input type="checkbox"> SMUR</label>
<label><input type="checkbox"> Hôpital</label>
<label><input type="checkbox"> Refus de soins</label>
<textarea placeholder="Autre soins..."></textarea>
</div>

<div class="section">
<h2>Blessures</h2>
<table>
<tr><th></th><th>Tête</th><th>Thorax</th><th>Abdomen</th></tr>
<tr><td>Abrasion</td><td><input type="checkbox"></td><td><input type="checkbox"></td><td><input type="checkbox"></td></tr>
<tr><td>Lacération</td><td><input type="checkbox"></td><td><input type="checkbox"></td><td><input type="checkbox"></td></tr>
</table>
<div class="canvas-container">
<canvas id="bodyCanvas"></canvas>
</div>
</div>

<div class="section">
<h2>Score Glasgow</h2>
<div class="grid">
<input type="number" id="yeux" min="1" max="4" placeholder="Yeux">
<input type="number" id="verbal" min="1" max="5" placeholder="Verbal">
<input type="number" id="moteur" min="1" max="6" placeholder="Moteur">
</div>
<h3>Total: <span id="total">0</span> / 15</h3>
</div>

<div class="section">
<h2>Signature</h2>
<div class="canvas-container">
<canvas id="signature"></canvas>
</div>
<button onclick="clearSignature()">Effacer</button>
</div>

</div>

<script>
// Générer numéro intervention
document.getElementById('intervention').value = 'INT-' + Date.now();

// Calcul Glasgow
function calcGlasgow() {
  let y = +document.getElementById('yeux').value || 0;
  let v = +document.getElementById('verbal').value || 0;
  let m = +document.getElementById('moteur').value || 0;
  document.getElementById('total').innerText = y + v + m;
}

document.querySelectorAll('#yeux,#verbal,#moteur').forEach(i => i.addEventListener('input', calcGlasgow));

// Signature dessin
const canvas = document.getElementById('signature');
const ctx = canvas.getContext('2d');
let drawing = false;

canvas.addEventListener('mousedown', () => drawing = true);
canvas.addEventListener('mouseup', () => drawing = false);
canvas.addEventListener('mousemove', draw);

function draw(e) {
  if (!drawing) return;
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.strokeStyle = '#00e5ff';
  ctx.lineTo(e.offsetX, e.offsetY);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(e.offsetX, e.offsetY);
}

function clearSignature() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}
</script>

</body>
</html>
